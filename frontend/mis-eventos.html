<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Eventos | Fiestalandia</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .eventos-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .btn-nuevo-evento {
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-nuevo-evento:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124,58,237,0.3);
        }
        
        .eventos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        
        .evento-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .evento-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 16px 40px rgba(124,58,237,0.12);
            border-color: #c084fc;
        }
        
        .evento-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .evento-nombre {
            color: #7c3aed;
            font-size: 1.3rem;
            font-weight: 600;
            margin: 0;
        }
        
        .evento-estado {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: capitalize;
        }
        
        .estado-planificando { background: #f3e8ff; color: #7c3aed; }
        .estado-cotizando { background: #fff3cd; color: #856404; }
        .estado-confirmado { background: #d4edda; color: #155724; }
        .estado-realizado { background: #cce5ff; color: #004085; }
        .estado-cancelado { background: #f8d7da; color: #721c24; }
        
        .evento-detalle {
            margin: 15px 0;
            padding: 15px 0;
            border-top: 1px solid #f3f4f6;
            border-bottom: 1px solid #f3f4f6;
        }
        
        .detalle-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            color: #6b7280;
        }
        
        .detalle-item i {
            width: 24px;
            margin-right: 10px;
            color: #7c3aed;
        }
        
        .evento-acciones {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn-accion {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-ver {
            background: #f3e8ff;
            color: #7c3aed;
        }
        
        .btn-editar {
            background: #e0f2fe;
            color: #0369a1;
        }
        
        .btn-eliminar {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .btn-accion:hover {
            transform: translateY(-2px);
            filter: brightness(0.95);
        }
        
        .no-eventos {
            text-align: center;
            padding: 60px;
            color: #9ca3af;
            font-size: 1.1rem;
            grid-column: 1 / -1;
        }
        
        .loading-spinner {
            text-align: center;
            padding: 60px;
            color: #7c3aed;
            grid-column: 1 / -1;
        }
        
        .modal-content {
            max-width: 500px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo">Fiestalandia</div>
            <div class="hamburger" id="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="menu" id="navMenu">
                <a href="index.html">Inicio</a>
                <a href="carrito.html" class="cart-link">
                    🛒 Carrito <span class="cart-badge" id="cartBadge">0</span>
                </a>
                <a href="#" class="btn-login" id="loginBtn">🔐 Login</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="eventos-header">
            <h1>📅 Mis Eventos</h1>
            <button class="btn-nuevo-evento" onclick="abrirModalNuevoEvento()">
                + Nuevo Evento
            </button>
        </div>

        <div class="eventos-grid" id="eventosGrid">
            <div class="loading-spinner">Cargando tus eventos...</div>
        </div>
    </main>

    <!-- Modal para nuevo/editar evento -->
    <div class="modal" id="modalEvento" style="display: none;">
        <div class="modal-content">
            <span class="modal-close" id="closeModalEvento">&times;</span>
            <h2 id="modalTitulo">Nuevo Evento</h2>
            
            <form id="formEvento">
                <input type="hidden" id="eventoId">
                
                <div class="form-group">
                    <label>Nombre del evento *</label>
                    <input type="text" id="eventoNombre" placeholder="Ej: Boda de María y Juan" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Tipo de evento *</label>
                        <select id="eventoTipo" required>
                            <option value="">Seleccionar...</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Fecha *</label>
                        <input type="date" id="eventoFecha" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Número de invitados</label>
                    <input type="number" id="eventoInvitados" min="0" placeholder="Ej: 100">
                </div>
                
                <div class="form-group">
                    <label>Ubicación</label>
                    <input type="text" id="eventoUbicacion" placeholder="Dirección del evento">
                </div>
                
                <div class="form-group">
                    <label>Notas adicionales</label>
                    <textarea id="eventoMensaje" rows="3" placeholder="Detalles importantes..."></textarea>
                </div>
                
                <button type="submit" class="modal-btn">Guardar Evento</button>
            </form>
        </div>
    </div>

    <!-- Modal de confirmación para eliminar -->
    <div class="modal" id="modalConfirmar" style="display: none;">
        <div class="modal-content" style="max-width: 400px;">
            <span class="modal-close" id="closeModalConfirmar">&times;</span>
            <h3>Confirmar eliminación</h3>
            <p>¿Estás seguro de que deseas eliminar este evento?</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="modal-btn" style="background: #9ca3af;" onclick="cerrarModalConfirmar()">Cancelar</button>
                <button class="modal-btn" style="background: #dc2626;" id="btnConfirmarEliminar">Eliminar</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/mis-eventos.js"></script>
</body>
</html>
