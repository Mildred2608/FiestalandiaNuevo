<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos | Panel Admin</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <nav id="admin-navbar"></nav>

    <main class="admin-container">
        <h1 class="admin-title">Gestión de Eventos</h1>

        <div class="admin-panel active">
            <div class="panel-header">
                <h2>Lista de Eventos</h2>
                <input type="date" id="filtroFecha" class="date-input">
            </div>

            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Evento</th>
                        <th>Cliente</th>
                        <th>Tipo</th>
                        <th>Fecha</th>
                        <th>Invitados</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaEventos">
                    <tr>
                        <td colspan="7" class="loading-row">Cargando eventos...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/admin-header.js"></script>
    <script src="js/admin-eventos.js"></script>
</body>
</html>
