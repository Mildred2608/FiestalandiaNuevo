<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Solicitudes de Servicio | Fiestalandia</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/missoli.css">
 
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo">Fiestalandia</div>
            <div class="hamburger" id="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="menu" id="navMenu">
                <a href="index.html">Inicio</a>
                <a href="carrito.html" class="cart-link">
                    🛒 Carrito <span class="cart-badge" id="cartBadge">0</span>
                </a>
                <a href="#" class="btn-login" id="loginBtn">🔐 Login</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="solicitudes-header">
            <h1>📋 Mis Solicitudes de Servicio</h1>
            <button class="btn-nueva-solicitud" onclick="window.location.href='solicitar-registro-servicio.html'">
                + Nueva Solicitud
            </button>
        </div>

        <div class="filtros">
            <button class="filtro-btn active" data-estado="todas">Todas</button>
            <button class="filtro-btn" data-estado="pendiente">⏳ Pendientes</button>
            <button class="filtro-btn" data-estado="aprobada">✅ Aprobadas</button>
            <button class="filtro-btn" data-estado="rechazada">❌ Rechazadas</button>
        </div>

        <div id="solicitudesContainer" class="solicitudes-grid">
            <div class="loading-spinner">Cargando solicitudes...</div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/mis-solicitudes-servicio.js"></script>
</body>
</html>
