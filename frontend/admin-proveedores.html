<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proveedores | Panel Admin</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo">Fiestalandia Admin</div>
            <div class="hamburger" id="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="menu" id="navMenu">
                <a href="admin.html">← Volver al panel</a>
                <a href="index.html">Inicio</a>
                <a href="#" class="btn-login" id="adminName">👤 Admin</a>
            </div>
        </div>
    </nav>

    <main class="admin-container">
        <h1 class="admin-title">Gestión de Proveedores</h1>

        <div class="admin-panel active">
            <div class="panel-header">
                <h2>Lista de Proveedores</h2>
                <button class="btn-primary" id="btnNuevoProveedor">+ Nuevo Proveedor</button>
            </div>

            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Teléfono</th>
                        <th>Estado</th>
                        <th>Fecha Registro</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaProveedores">
                    <tr>
                        <td colspan="7" class="loading-row">Cargando proveedores...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div class="modal" id="modalProveedor" style="display: none;">
        <div class="modal-content">
            <span class="modal-close" id="closeModalProveedor">&times;</span>
            <h2>Nuevo Proveedor</h2>
            <form id="formProveedor">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="provNombre" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="provEmail" required>
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="text" id="provTelefono">
                </div>
                <div class="form-group">
                    <label>Dirección</label>
                    <textarea id="provDireccion" rows="2"></textarea>
                </div>
                <button type="submit" class="modal-btn">Guardar</button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/admin-header.js"></script>
    <script src="js/admin-proveedores.js"></script>
</body>
</html>
