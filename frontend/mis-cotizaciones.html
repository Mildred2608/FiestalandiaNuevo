<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Cotizaciones | Fiestalandia</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo">Fiestalandia</div>
            <div class="hamburger" id="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="menu" id="navMenu">
                <a href="index.html">Inicio</a>
                <a href="carrito.html" class="cart-link">
                    🛒 Carrito <span class="cart-badge" id="cartBadge">0</span>
                </a>
                <a href="#" class="btn-login" id="loginBtn">🔐 Login</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="cotizaciones-header">
            <h1>💰 Mis Cotizaciones</h1>
            <div class="filtros">
                <button class="filtro-btn active" data-estado="todas">Todas</button>
                <button class="filtro-btn" data-estado="pendiente">Pendientes</button>
                <button class="filtro-btn" data-estado="enviada">Enviadas</button>
                <button class="filtro-btn" data-estado="aceptada">Aceptadas</button>
                <button class="filtro-btn" data-estado="rechazada">Rechazadas</button>
            </div>
        </div>

        <div id="cotizacionesContainer" class="cotizaciones-grid">
            <div class="loading-spinner">Cargando cotizaciones...</div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/mis-cotizaciones.js"></script>
</body>
</html>
