<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios | Fiestalandia</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/servicios.css">
</head>
<body>
    <!-- ===== NAVEGACIÓN ===== -->
    <nav>
        <div class="nav-container">
            <div class="logo">Fiestalandia</div>
            <div class="hamburger" id="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="menu" id="navMenu">
                <a href="javascript:history.back()" class="back-link">← Volver a subcategorías</a>
                <a href="index.html">Inicio</a>
                <a href="carrito.html" class="cart-link">
                    🛒 Carrito <span class="cart-badge" id="cartBadge">0</span>
                </a>
                <a href="#" class="btn-login" id="loginBtn">🔐 Login</a>
            </div>
        </div>
    </nav>

    <!-- ===== CONTENIDO PRINCIPAL ===== -->
    <main class="container">
        <div class="servicios-header">
            <h1 id="subcategoriaTitulo">Cargando servicios...</h1>
            <p id="subcategoriaDescripcion"></p>
        </div>

        <div class="servicios-grid" id="serviciosGrid">
            <div class="loading-spinner">Cargando servicios disponibles...</div>
        </div>
    </main>

    <!-- ===== MODALES ===== -->
    <div class="modal" id="authModal" style="display: none;">
        <!-- Contenido del modal de login (igual que en index.html) -->
    </div>

    <div class="modal" id="perfilModal" style="display: none;">
        <!-- Contenido del modal de perfil (igual que en index.html) -->
    </div>

    <script src="js/auth.js"></script>
    <script src="js/servicios.js"></script>
</body>
</html>
